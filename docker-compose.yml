services:
  postgres:
    image: postgres:15-alpine
    container_name: cattell_postgres
    environment:
      POSTGRES_DB: cattell_db
      POSTGRES_USER: cattell_user
      POSTGRES_PASSWORD: cattell_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cattell_user -d cattell_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
